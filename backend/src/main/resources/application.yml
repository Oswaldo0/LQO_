spring:
  application:
    name: lqo-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:LQO_DATABASE}?sslMode=${MYSQL_SSL_MODE:PREFERRED}&allowPublicKeyRetrieval=${MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL:false}&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:lqo-development-secret-change-me-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}

auth:
  bootstrap:
    enabled: ${AUTH_BOOTSTRAP_ENABLED:true}
    username: ${AUTH_BOOTSTRAP_USERNAME:admin}
    password: ${AUTH_BOOTSTRAP_PASSWORD:admin123}

management:
  endpoints:
    web:
      exposure:
        include: health,info
